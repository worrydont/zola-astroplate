{% if page.taxonomies.categories %}
  <div class="flex flex-wrap gap-2">
    {% for cat in page.taxonomies.categories %}
      <a href="{{ get_taxonomy_url(kind="categories", name=cat) }}" class="rounded bg-primary px-3 py-1 text-xs font-semibold text-white hover:bg-opacity-90 transition-colors">
        {{ cat }}
      </a>
    {% endfor %}
  </div>
{% endif %}
