name: Deploy demo to GitHub Pages

on:
  # Runs on pushes to the default branch
  push:
    branches: [main]
  # Allows manual runs from the Actions tab
  workflow_dispatch:

# Allow the workflow to push the built site to the gh-pages branch
permissions:
  contents: write

# Only one deployment at a time; let in-progress runs finish
concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The repo contains a `themes/zola-astroplate -> ..` self-theme symlink.
          # Default git symlink handling on Linux runners preserves it.
          submodules: false

      - name: Install Zola 0.22.1
        run: |
          ZOLA_VERSION="0.22.1"
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin zola
          zola --version

      # NOTE: no CSS/Tailwind build. The theme ships a committed
      # static/css/generated.css and config.toml sets compile_sass = false.
      # `-o public` forces output to the repo root; the self-theme symlink
      # otherwise makes a plain `zola build` emit to the parent directory.
      - name: Build demo site
        run: zola build -o public

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
