# The URL the site will be built for
base_url = "https://worrydont.github.io/zola-astroplate/"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# The default language
default_language = "en"

# The site theme to use
theme = "zola-astroplate"

# When set to "true", a search index is built from the pages and section content for `default_language`
build_search_index = true

# When set to "true", a feed is automatically generated
generate_feeds = true

# The taxonomies to use for the site
taxonomies = [
    { name = "tags", paginate_by = 6, feed = true },
    { name = "categories", paginate_by = 6, feed = true },
]

[markdown.highlighting]
light_theme = "github-light-default"
dark_theme = "ayu-dark"
style = "class"

[extra]
title = "zola-astroplate"
site_description = "Live demo of the zola-astroplate theme"
copyright = "Copyright {year} by zola-astroplate"
author = { name = "zola-astroplate", homepage = "https://github.com/worrydont/zola-astroplate" }
path_language_resources = "i18n/"

# The main navigation menu
menu_pages = [
    { title = "Home", url = "/" },
    { title = "About", url = "/about/" },
    { title = "Blog", url = "/blog/" },
]

# The pages that appear in the footer
footer_pages = [
    { title = "About", url = "/about/" },
]

# Social links
social_links = [
    { name = "github", enabled = true, link = "https://github.com/worrydont/zola-astroplate", svg = '<svg class="h-6 w-6" fill="currentColor" viewBox="0 0 1024 1024"><path d="M8 0C3.58 0 0 3.58 0 8C0 11.54 2.29 14.53 5.47 15.59C5.87 15.66 6.02 15.42 6.02 15.21C6.02 15.02 6.01 14.39 6.01 13.72C4 14.09 3.48 13.23 3.32 12.78C3.23 12.55 2.84 11.84 2.5 11.65C2.22 11.5 1.82 11.13 2.49 11.12C3.12 11.11 3.57 11.7 3.72 11.94C4.44 13.15 5.59 12.81 6.05 12.6C6.12 12.08 6.33 11.73 6.56 11.53C4.78 11.33 2.92 10.64 2.92 7.58C2.92 6.71 3.23 5.99 3.74 5.43C3.66 5.23 3.38 4.41 3.82 3.31C3.82 3.31 4.49 3.1 6.02 4.13C6.66 3.95 7.34 3.86 8.02 3.86C8.7 3.86 9.38 3.95 10.02 4.13C11.55 3.09 12.22 3.31 12.22 3.31C12.66 4.41 12.38 5.23 12.3 5.43C12.81 5.99 13.12 6.7 13.12 7.58C13.12 10.65 11.25 11.33 9.47 11.53C9.76 11.78 10.01 12.26 10.01 13.01C10.01 14.08 10 14.94 10 15.21C10 15.42 10.15 15.67 10.55 15.59C13.71 14.53 16 11.53 16 8C16 3.58 12.42 0 8 0Z" transform="scale(64)"/></svg>' },
]

# Logo configuration
logo = "/images/logo.png"
logo_darkmode = "/images/logo-darkmode.png"

# Dark/light mode toggle icons (inline SVG)
[extra.displaymode.sun]
svg = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"></path></svg>'

[extra.displaymode.moon]
svg = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"></path></svg>'

[extra.sections]
banner = true
features = true
testimonials = true
cta = true
about = false
